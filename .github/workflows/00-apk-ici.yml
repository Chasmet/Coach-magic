name: 00 APK ICI - Coach Magic

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: coach-magic-apk
  cancel-in-progress: true

jobs:
  creer-apk:
    name: CREER ET PUBLIER COACH MAGIC APK
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le projet
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Java Android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Installer les dependances
        run: npm install

      - name: Preparer le dossier web
        run: npm run prepare:web

      - name: Creer le projet Android
        run: npx cap add android

      - name: Synchroniser Android
        run: npx cap sync android

      - name: Construire l APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Preparer le fichier APK
        run: |
          mkdir -p TELECHARGER-APK-ICI
          cp android/app/build/outputs/apk/debug/app-debug.apk TELECHARGER-APK-ICI/Coach-Magic.apk
          test -f TELECHARGER-APK-ICI/Coach-Magic.apk
          ls -lh TELECHARGER-APK-ICI/Coach-Magic.apk

      - name: Publier l artifact APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-A-TELECHARGER-ICI-Coach-Magic
          path: TELECHARGER-APK-ICI/Coach-Magic.apk
          if-no-files-found: error

      - name: Mettre a jour le tag de la derniere version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f coach-magic-latest
          git push origin -f coach-magic-latest

      - name: Publier l APK dans une Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: coach-magic-latest
          name: Coach Magic APK - Derniere version
          body: |
            APK Android de Coach Magic.
            Appuie sur Coach-Magic.apk dans les fichiers de cette release pour le telecharger.
          files: TELECHARGER-APK-ICI/Coach-Magic.apk
          make_latest: true

      - name: Publier un lien direct sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./TELECHARGER-APK-ICI
          publish_branch: gh-pages
          destination_dir: downloads
          keep_files: true
