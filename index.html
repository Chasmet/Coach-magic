const D=[['mon','Lundi'],['tue','Mardi'],['wed','Mercredi'],['thu','Jeudi'],['fri','Vendredi'],['sat','Samedi'],['sun','Dimanche']],DK={1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat',0:'sun'},S='coachMagic.v1';let st=JSON.parse(localStorage.getItem(S)||'{}'),cur='today';function save(){localStorage.setItem(S,JSON.stringify(st))}function iso(d){return d.toISOString().slice(0,10)}function monday(d){d=new Date(d);let x=d.getDay()||7;d.setDate(d.getDate()-x+1);d.setHours(0,0,0,0);return d}function wk(){return iso(monday(new Date()))}function add(d,n){d=new Date(d);d.setDate(d.getDate()+n);return d}function ensure(){let w=wk();st.weeks=st.weeks||{};if(!st.active||new Date(st.active)<new Date(w))st.active=w;if(!st.weeks[st.active])st.weeks[st.active]={tr:{},done:{c:{},y:{},n:{}},grip:{},fat:'normal',water:{}};save()}ensure();function W(){ensure();return st.weeks[st.active]}function c(o){return Object.values(o||{}).filter(Boolean).length}function tdy(){return DK[new Date().getDay()]}function done(r,k){return !!W().done[r][k]}function tog(r,k){W().done[r][k]=!W().done[r][k];save();render()}function grip(k){W().grip[k]=!W().grip[k];save();render()}function fat(v){W().fat=v;save();render()}function before(k){let i=D.findIndex(x=>x[0]==k),n=0;for(let j=i-1;j>=0;j--){let x=D[j][0];if(done('c',x)||W().tr[x])n++;else break}return n}const base={mon:['🚴','Vélo elliptique + élastiques','15 min + grip léger','30–35 min',['Vélo 15 min','Élastiques','Étirements','Grip léger']],tue:['🏃','Tapis fractionné','30 min + pompes','40 min',['Tapis 30 min','Pompes','Étirements']],wed:['🧗','Monte escalier + circuit','15 min + pompe/gainage/roue + grip','45 min',['Monte escalier','Pompes','Gainage','Roue abdos','Grip normal']],thu:['🛌','Repos / entraînement','Repos si 3 jours faits','10 min',['Mobilité','Adducteurs','Dos','Respiration']],fri:['🟦','Repos ou léger','Selon jeudi','20–30 min',['Tapis léger','Pompes légères','Étirements']],sat:['🚴','Vélo + mobilité','15 min + élastiques + grip','30 mi <div class='card blue'><h3>Yvane aujourd’hui</h3><div class='session'><div class='emoji'>${y[0]}</div><div><b>${y[1]}</b><p class='muted'>${y[2]}</p></div></div><button class='btn green' onclick='tog("y","${k}")'>${done('y',k)?'Yvane validé ✅':'Séance Yvane faite'}</button></div><div class='card'><h3>Nutrition / hydratation</h3><p class='muted'>Cadre de journée, pas de menu compliqué.</p><div class='progress'><div class='bar' style='width:${pct(wd,5)}%'></div></div><p>${wd}/5 moments minimum</p><button class='btn ghost' onclick='tab("nutrition")'>Ouvrir</button></div>`}function week(){let a=new Date(st.active),b=add(a,6);return `<div class='card blue'><div class='row'><div><h3>Semaine du ${a.toLocaleDateString('fr-FR')} au ${b.toLocaleDateString('fr-FR')}</h3><p class='muted'>Ajoute un entraînement, l’app adapte repos et récupération.</p></div><button class='btn small' onclick='openM("${tdy()}")'>+ entraînement</button></div></div><div class='list'>${D.map(([k,l])=>{let p=plan(k);return `<div class='day ${k==tdy()?'today':''} ${done('c',k)?'done':''}'><div class='emoji'>${p[0]}</div><div class='info'><b>${l} ${W().tr[k]?'• entraînement':''}</b><small>${p[1]}<br>${p[2]}</small></div><button class='btn small ghost' onclick='openM("${k}")'>Modifier</button><button class='check ${done('c',k)?'on':''}' onclick='tog("c","${k}")'>✓</button></div>`}).join('')}</div><div class='card'><h3>Règles automatiques</h3><div class='warn'>Pas plus de 3 jours d’affilée. Après entraînement ou match : repos le lendemain. Mode très fatigué : mobilité seulement.</div></div>`}function cheikh(){return `${hero('cheikh')}<div class='card'><h3>Programme Cheikh</h3><p class='muted'>Adapté au travail physique, à la marche et au besoin de récupération.</p></div><div class='list'>${D.map(([k,l])=>{let p=plan(k);return `<div class='day ${done('c',k)?'done':''}'><div class='emoji'>${p[0]}</div><div class='info'><b>${l}</b><small>${p[1]} • ${p[3]}<br>${p[4].join(' • ')}</small></div><button class='check ${done('c',k)?'on':''}' onclick='tog("c","${k}")'>✓</button></div>`}).join('')}</div>`}function yvane(){let extra=['wed','thu'].filter(k=>done('y',k)).length;return `${hero('yvane')}<div class='card green'><h3>Yvane — semaine</h3><p class='muted'>Lundi foot école 12h–13h. Mercredi ou jeudi : technique/tactique. Max 2 séances extra.</p><div class='progress'><div class='bar' style='width:${pct(extra,2)}%'></div></div><p>${extra}/2 séances extra</p></div><div class='list'>${D.map(([k,l])=>{let p=yp[k];return `<div class='day ${done('y',k)?'done':''}'><div class='emoji'>${p[0]}</div><div class='info'><b>${l}</b><small>${p[1]}<br>${p[2]}</small></div><button class='check ${done('y',k)?'on':''}' onclick='tog("y","${k}")'>✓</button></div>`}).join('')}</div><div class='card blue'><h3>Gardien + frappes + technique</h3>${['Échauffement : petits appuis','Gardien : arrêts + relances','Frappes : précision avant puissance','Technique : conduite + contrôle'].map((x,i)=>`<div class='water'><button class='check on'>${i+1}</button><div><b>${x}</b><small>Qualité avant vitesse.</small></div></div>`).join('')}</div><div class='card'><h3>Questions tactiques</h3><p>Où est l’espace libre ?</p><p>Je passe, je dribble ou je temporise ?</p><p>Après ma passe, où je me replace ?</p></div><div class='card orange'><div class='hero'><img class='mini' src='${IMG.nelvyn}'><div><h3>Nelvyn — missions</h3><p class='muted'>Défis rapides et ludiques.</p></div></div><div class='missions'><button class='mission' onclick='tog("n","precision")'>🎯 Précision<br>Étoiles</button><button class='mission' onclick='tog("n","ballon")'>⚽ Défi ballon<br>Fun</button></div></div>`}function nutrition(){let d=iso(new Date()),obj=W().water[d]||{},n=c(obj);return `<div class='card blue'><h3>Nutrition / Hydratation</h3><p class='muted'>Moments clés de la journée. Pas de menus fixes.</p><div class='progress'><div class='bar' style='width:${pct(n,5)}%'></div></div><p>${n}/5 moments validés</p></div><div class='list'>${water.map(([k,t,txt,e])=>`<div class='water'><div class='emoji'>${e}</div><div class='info'><b>${t}</b><small>${txt}</small></div><button class='check ${obj[k]?'on':''}' onclick='waterT("${k}")'>✓</button></div>`).join('')}</div><div class='card orange'><h3>Règles simples</h3><p>Jour cardio : ne pars pas à vide si tu as faim.</p><p>Jour foot : évite un repas lourd juste avant.</p><p>Jour repos : hydratation normale.</p></div>`}function waterT(k){let d=iso(new Date());W().water[d]=W().water[d]||{};W().water[d][k]=!W().water[d][k];save();render()}function suivi(){let w=W(),ch=c(w.done.c),yv=c(w.done.y),ne=c(w.done.n),g=c(w.grip),wa=Object.values(w.water).reduce((a,b)=>a+c(b),0);return `<div class='card blue'><h3>Suivi de la semaine</h3><div class='grid3'><div><img class='mini' src='${IMG.cheikh}'><b>Cheikh</b><p>${ch} séances</p></div><div><img class='mini' src='${IMG.yvane}'><b>Yvane</b><p>${yv} séances</p></div><div><img class='mini' src='${IMG.nelvyn}'><b>Nelvyn</b><p>${ne} missions</p></div></div></div><div class='card'><h3>Résumé</h3><div class='stats'><div class='stat'><b>${ch}/6</b><small>Cheikh</small></div><div class='stat'><b>${yv}/2</b><small>Yvane</small></div><div class='stat'><b>${g}/3</b><small>Grip</small></div></div><br><div class='stats'><div class='stat'><b>${wa}</b><small>Eau</small></div><div class='stat'><b>${ne}</b><small>Nelvyn</small></div><div class='stat'><b>${w.fat=='normal'?'OK':'Repos'}</b><small>Fatigue</small></div></div></div><div class='card green'><h3>Fin de semaine</h3><p class='muted'>La semaine est sauvegardée, puis la suivante repart à zéro.</p><button class='btn' onclick='nextWeek()'>Passer à la semaine suivante</button></div>`}function nextWeek(){if(!confirm('Créer une nouvelle semaine ?'))return;let n=iso(add(new Date(st.active),7));st.active=n;st.weeks[n]={tr:{},done:{c:{},y:{},n:{}},grip:{},fat:'normal',water:{}};save();render()}function tab(t){cur=t;document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.
