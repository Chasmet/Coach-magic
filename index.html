<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07101f"><link rel="manifest" href="manifest.webmanifest"><title>Coach Magic</title><style>:root{--bg:#050912;--card:#0c1728;--line:#ffffff22;--txt:#f7f9ff;--muted:#a9b6ca;--blue:#2388ff;--green:#85e646;--orange:#ff9d2e}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:radial-gradient(circle at top,#10243f,#050912 48%,#02040a);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:92px}.app{max-width:560px;margin:auto;padding:14px}.top{position:sticky;top:0;z-index:5;margin:-14px -14px 14px;padding:12px 14px;background:#07101ff2;backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{font-size:21px;font-weight:1000}.brand b{color:var(--blue)}.brand i{color:#ff4242;font-style:normal}.ib{width:46px;height:46px;border-radius:17px;border:1px solid var(--line);background:#101b2d;color:white;font-size:22px}.page{display:none;gap:12px}.page.on{display:grid}.card{background:linear-gradient(145deg,#111d31,#08111f);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 14px 35px #0008}.blue{border-color:#2f80ff88}.green{border-color:#86e44e88}.orange{border-color:#ff9d2e88}.muted{color:var(--muted)}.hero{display:flex;gap:13px;align-items:center}.avatar{width:78px;height:78px;border-radius:24px;background:#050912;border:2px solid #2f80ff99;display:grid;place-items:center;font-weight:1000;font-size:22px}.pill{display:inline-block;border:1px solid #2f80ff88;background:#2f80ff22;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:1000;letter-spacing:.03em}.base{background:#2f80ff30;color:#9ec5ff;border:1px solid #2f80ff88}.spec{background:#ff9d2e25;color:#ffd49c;border:1px solid #ff9d2e88}.add{background:#86e44e22;color:#c8ffad;border:1px solid #86e44e88}.list{display:grid;gap:10px}.day,.line{display:flex;gap:10px;align-items:center;background:#ffffff0b;border:1px solid var(--line);border-radius:18px;padding:11px}.day.done,.line.done{border-color:var(--green)}.today{border-color:var(--blue);background:#2f80ff18}.em{width:48px;height:48px;border-radius:15px;background:#020912;display:grid;place-items:center;font-size:25px;flex:none}.info{flex:1;min-width:0}.info b{display:block}.info small{color:#b8c3d2;line-height:1.35}.btn{border:0;border-radius:15px;padding:12px;background:var(--blue);color:white;font-weight:1000}.btn.full{width:100%;margin-top:9px}.btn.small{padding:9px 10px;font-size:12px}.ghost{background:transparent;border:1px solid #2f80ff88}.check{width:32px;height:32px;border-radius:50%;border:2px solid #ffffff55;background:transparent;color:white;font-weight:1000}.check.on{background:var(--green);color:#061006;border-color:var(--green)}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.bar0{height:10px;background:#ffffff22;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}.nav{position:fixed;bottom:0;left:0;right:0;background:#07101ff2;border-top:1px solid var(--line);padding:7px 4px}.navin{max-width:560px;margin:auto;display:grid;grid-template-columns:repeat(6,1fr);gap:2px}.nav button{background:0;border:0;color:#aab6c8;border-radius:14px;padding:7px 2px;font-size:10px;font-weight:900}.nav button.sel{background:#2f80ff33;color:white}.nav span{display:block;font-size:20px}.modal{position:fixed;inset:0;display:none;align-items:end;justify-content:center;background:#000c;z-index:9;padding:0}.modal.show{display:flex}.sheet{width:min(560px,100%);max-height:100vh;overflow:auto;background:radial-gradient(circle at top,#0a2039,#06101d 50%,#030811);border:1px solid #ffffff18;border-radius:28px 28px 0 0;padding:18px 14px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px #000c}.editor-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:18px}.back{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:#ffffff0b;color:white;font-size:24px}.editor-title{flex:1}.editor-title h2{margin:0 0 3px;font-size:25px}.editor-title p{margin:0;color:var(--muted)}.section-title{display:flex;align-items:center;gap:8px;margin:18px 2px 10px;font-weight:1000;letter-spacing:.02em}.section-title span{font-size:20px}.day-types{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.type-card{min-height:132px;border:1px solid #ffffff2b;border-radius:20px;background:linear-gradient(180deg,#172438,#0a1422);color:white;padding:12px 7px;display:grid;place-items:center;text-align:center;font-weight:950;position:relative}.type-card .big{font-size:38px;display:block}.type-card small{display:block;margin-top:6px;font-size:13px;color:#d6dfec}.type-card.selected{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),0 0 24px #2388ff55;background:linear-gradient(180deg,#0d2d57,#071426)}.type-card.foot.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 24px #85e64655;background:linear-gradient(180deg,#153b16,#071609)}.type-card.fat.selected{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange),0 0 24px #ff9d2e44}.type-card .tick{display:none;position:absolute;right:8px;top:8px;width:24px;height:24px;border-radius:50%;background:var(--blue);place-items:center;font-size:14px}.type-card.selected .tick{display:grid}.type-card.foot.selected .tick{background:var(--green);color:#061006}.type-card.fat.selected .tick{background:var(--orange);color:#201000}.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.main-card{min-height:135px;border:1px solid #ffffff2b;border-radius:20px;background:linear-gradient(145deg,#18263a,#0c1727);color:white;padding:14px;text-align:left;font-weight:950;position:relative}.main-card .big{font-size:40px;display:block;margin-bottom:16px}.main-card small{display:block;color:#c7d1df;font-size:13px;margin-top:4px}.main-card.selected{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),0 0 24px #2388ff55;background:linear-gradient(145deg,#0f376b,#07182d)}.main-card .tick{display:none;position:absolute;right:10px;top:10px;width:26px;height:26px;border-radius:50%;background:var(--blue);place-items:center}.main-card.selected .tick{display:grid}.quick-row{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.quick-chip{white-space:nowrap;border:1px solid #ffffff2b;border-radius:16px;background:#ffffff0b;color:white;padding:11px 13px;font-weight:900}.quick-chip.selected{border-color:var(--green);background:#86e44e22;color:#d8ffc4;box-shadow:0 0 18px #86e44e2e}.why{display:flex;gap:12px;align-items:center;background:linear-gradient(145deg,#15263a,#0c1727);border:1px solid #ffffff2b;border-radius:20px;padding:14px}.why .em{background:#0d2f58;border:1px solid #2f80ff88}.why b{display:block}.why small{color:#b9c5d5}.editor-actions{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-top:18px;position:sticky;bottom:0;background:linear-gradient(transparent,#06101d 24%);padding-top:18px}.cancel{background:#07101f;border:1px solid #ffffff55}.save{background:linear-gradient(135deg,#218cff,#1558e8);box-shadow:0 8px 24px #0d55e655}.stat{text-align:center;background:#ffffff0b;border:1px solid var(--line);border-radius:16px;padding:12px}.stat b{display:block;font-size:22px}@media(max-width:390px){.brand{font-size:18px}.day-types{gap:6px}.type-card{min-height:118px;font-size:13px}.type-card .big{font-size:32px}.main-card{min-height:125px}}</style></head><body><main class="app"><header class="top"><div class="row"><button class="ib" onclick="tab('week')">☰</button><div class="brand">Coach <b>Semaine</b> <i>CHK</i></div><button class="ib" onclick="nextWeek()">↻</button></div></header><section id="today" class="page on"></section><section id="week" class="page"></section><section id="cheikh" class="page"></section><section id="yvane" class="page"></section><section id="nutrition" class="page"></section><section id="suivi" class="page"></section></main><nav class="nav"><div class="navin"><button data-t="today" class="sel"><span>🏠</span>Aujourd’hui</button><button data-t="week"><span>📅</span>Semaine</button><button data-t="cheikh"><span>👤</span>Cheikh</button><button data-t="yvane"><span>⚽</span>Yvane</button><button data-t="nutrition"><span>💧</span>Nutrition</button><button data-t="suivi"><span>📈</span>Suivi</button></div></nav><div id="modal" class="modal"><div id="sheet" class="sheet"></div></div><script>const days=['mon','tue','wed','thu','fri','sat','sun'];const names={mon:'Lundi',tue:'Mardi',wed:'Mercredi',thu:'Jeudi',fri:'Vendredi',sat:'Samedi',sun:'Dimanche'};const todayMap={1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat',0:'sun'};const people={cheikh:['CHK','Cheikh','blue','Force • endurance • travail physique'],yvane:['YV','Yvane','green','Foot • technique • gardien'],nelvyn:['NV','Nelvyn','orange','Missions • fun • étoiles']};const basePlan={cheikh:{mon:[['🚴','Vélo elliptique','15 min'],['🟢','Élastiques','10 min'],['✊','Grip léger','6–8 min'],['🧘','Étirements','5 min']],tue:[['🏃','Tapis fractionné','30 min'],['💪','Pompes','3 séries'],['🧘','Étirements','5–8 min']],wed:[['🧗','Monte escalier','15 min'],['💪','Pompes','3–4 x 10'],['🧱','Gainage','3–4 x 30 sec'],['⚙️','Roue abdos','3 x 5–8'],['✊','Grip normal','8–10 min']],thu:[['🛌','Repos actif','10–15 min'],['🧘','Mobilité hanches/adducteurs','douce']],fri:[['🟦','Séance légère selon jeudi','20–30 min'],['💪','Pompes légères','option'],['🧘','Étirements','5–10 min']],sat:[['🚴','Vélo elliptique','15 min'],['🟢','Élastiques','10 min'],['✊','Grip','6–10 min'],['🧘','Étirements','10 min']],sun:[['🛌','Repos complet','récupération']]},yvane:{mon:[['🏫','Foot école midi','12h–13h'],['🥅','Gardien','20 min'],['🎯','Frappes','20 min'],['⚽','Technique ballon','10–15 min']],tue:[['🛌','Repos','récupération']],wed:[['⚽','Technique ballon','20–25 min'],['🧠','Tactique simple','3 questions']],thu:[['🥅','Gardien ou entraînement club','option'],['🎯','Frappes précision','10–15 min']],fri:[['🛌','Repos','récupération']],sat:[['🎮','Jeu libre ballon','plaisir']],sun:[['🛌','Repos','récupération']]},nelvyn:{mon:[['🎯','Mission précision','5–10 min']],tue:[['🛌','Repos','récupération']],wed:[['⚽','Défi ballon','10 min']],thu:[['⭐','Mission fun','5–10 min']],fri:[['🛌','Repos','récupération']],sat:[['🏃','Parcours vitesse','8 min']],sun:[['🛌','Repos','récupération']]}};const mainChoices=[{id:'tapis',emoji:'🏃',name:'Tapis de course',detail:'Fractionné automatique • 30 min'},{id:'marche',emoji:'🧗',name:'Montée marche',detail:'Simulateur escalier • 15 min'},{id:'velo',emoji:'🚴',name:'Vélo elliptique',detail:'Cardio léger • 15 min'},{id:'recup',emoji:'🧘',name:'Exercice récupérateur',detail:'Mobilité + étirements • 10–15 min'}];const quickChoices=[{id:'grip',emoji:'✊',name:'Grip'},{id:'pompes',emoji:'💪',name:'Pompes'},{id:'etirements',emoji:'🧘',name:'Étirements'},{id:'gainage',emoji:'🧱',name:'Gainage'},{id:'elastiques',emoji:'🟢',name:'Élastiques'}];let state=JSON.parse(localStorage.getItem('coachMagicV6')||'{}'),current='today',edit=null;function save(){localStorage.setItem('coachMagicV6',JSON.stringify(state))}function monday(){let d=new Date(),n=d.getDay()||7;d.setDate(d.getDate()-n+1);return d.toISOString().slice(0,10)}function week(){state.weeks=state.weeks||{};state.active=state.active||monday();if(!state.weeks[state.active])state.weeks[state.active]={entries:{},water:{}};return state.weeks[state.active]}function entry(p,d){let w=week(),k=p+'_'+d;if(!w.entries[k])w.entries[k]={dayType:'normal',main:'',quick:[],base:{},done:false};return w.entries[k]}function todayD(){return todayMap[new Date().getDay()]}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function clone(x){return JSON.parse(JSON.stringify(x))}function isDone(p,d){let e=entry(p,d);return e.done||Object.values(e.base||{}).some(Boolean)||e.quick.length>0}function streakBefore(d){let i=days.indexOf(d),n=0;for(let j=i-1;j>=0;j--){if(isDone('cheikh',days[j]))n++;else break}return n}function plan(p,d){let e=entry(p,d),items=basePlan[p][d].map(x=>({emoji:x[0],name:x[1],detail:x[2]})),spec=[];if(p==='cheikh'){if(e.dayType==='foot'){items=[{emoji:'⚽',name:'Entraînement foot',detail:'Foot uniquement'}];spec.push('Entraînement déclaré : pas de musculation en plus.')}else if(e.dayType==='repos'){items=[{emoji:'🛌',name:'Repos',detail:'Récupération complète'}];spec.push('Repos choisi pour récupérer.')}else if(e.dayType==='fatigue'){items=[{emoji:'🧘',name:'Exercice récupérateur',detail:'Mobilité + étirements'}];spec.push('Fatigue signalée : séance très légère.')}else if(e.main){let m=mainChoices.find(x=>x.id===e.main);if(m)items=[{emoji:m.emoji,name:m.name,detail:m.detail}]}if(streakBefore(d)>=3&&e.dayType==='normal')spec.push('Déjà 3 jours d’affilée : récupération conseillée.');if(e.quick.length)spec.push(e.quick.length+' ajout(s) rapide(s).')}if(p==='yvane'){spec.push('Deux séances extra maximum dans la semaine.');if(d==='mon')spec.push('Foot école 12h–13h : gardien + frappes + technique.')}if(p==='nelvyn')spec.push('Format mission courte et ludique.');return{items,spec}}function profileCard(p){let a=people[p];return `<div class="card ${a[2]}"><div class="hero"><div class="avatar">${a[0]}</div><div><h2>${a[1]}</h2><p class="muted">${a[3]}</p><span class="pill">Programme semaine</span></div></div></div>`}function dayCard(p,d){let pl=plan(p,d),e=entry(p,d),done=isDone(p,d),baseTxt=pl.items.map(x=>x.name).slice(0,2).join(' + '),specTxt=pl.spec[0]||'Programme normal';return `<div class="day ${d===todayD()?'today':''} ${done?'done':''}"><div class="em">${pl.items[0]?.emoji||'✅'}</div><div class="info"><b>${names[d]}${e.dayType==='foot'?' • entraînement':''}</b><small><span class="badge base">BASE</span> ${esc(baseTxt)}<br><span class="badge spec">SPÉCIFICITÉS</span> ${esc(specTxt)}${e.quick.length?`<br><span class="badge add">AJOUTS</span> ${e.quick.length} ajout(s)`:''}</small></div><button class="btn ghost small" onclick="openEditor('${p}','${d}')">Modifier</button><button class="check ${done?'on':''}" onclick="entry('${p}','${d}').done=!entry('${p}','${d}').done;save();render()">✓</button></div>`}function openEditor(p='cheikh',d=todayD()){edit={p,d,draft:clone(entry(p,d))};renderEditor();document.getElementById('modal').classList.add('show')}function renderEditor(){const p=edit.p,d=edit.d,e=edit.draft;if(p!=='cheikh'){document.getElementById('sheet').innerHTML=`<div class="editor-head"><button class="back" onclick="cancelEditor()">←</button><div class="editor-title"><h2>Modifier ${people[p][1]}</h2><p>${names[d]}</p></div></div><div class="card"><p class="muted">Le nouveau menu complet est réservé pour le moment au profil Cheikh.</p><button class="btn full" onclick="saveEditor()">Enregistrer</button></div>`;return}const why=editorWhy(e,d);document.getElementById('sheet').innerHTML=`<div class="editor-head"><button class="back" onclick="cancelEditor()">←</button><div class="editor-title"><h2>Modifier ma journée</h2><p>Choisis rapidement le type de journée</p></div><div class="brand" style="font-size:14px;text-align:right">COACH<br><b>SEMAINE</b> <i>CHK</i></div></div><div class="section-title"><span>📅</span>AUJOURD’HUI — ${names[d]}</div><div class="day-types">${typeCard('repos','🛌','Repos','Récupération')}${typeCard('normal','🧍','Normal','Programme prévu')}${typeCard('fatigue','😮‍💨','Fatigué','Séance légère','fat')}${typeCard('foot','⚽','Entraînement foot','Foot uniquement','foot')}</div><div class="section-title"><span>🏋️</span>SÉANCE PRINCIPALE</div><div class="main-grid">${mainChoices.map(m=>mainCard(m)).join('')}</div><div class="section-title"><span>⚡</span>AJOUTS RAPIDES</div><div class="quick-row">${quickChoices.map(q=>quickChip(q)).join('')}</div><div class="section-title"><span>💬</span>POURQUOI CE CHOIX ?</div><div class="why"><div class="em">📝</div><div><b>${esc(why.title)}</b><small>${esc(why.text)}</small></div></div><div class="editor-actions"><button class="btn cancel" onclick="cancelEditor()">Annuler</button><button class="btn save" onclick="saveEditor()">✓ Enregistrer</button></div>`}function typeCard(id,emoji,title,sub,cls=''){let on=edit.draft.dayType===id;return `<button class="type-card ${cls} ${on?'selected':''}" onclick="selectDayType('${id}')"><span class="tick">✓</span><span><span class="big">${emoji}</span>${title}<small>${sub}</small></span></button>`}function mainCard(m){let on=edit.draft.main===m.id&&edit.draft.dayType==='normal';return `<button class="main-card ${on?'selected':''}" onclick="selectMain('${m.id}')"><span class="tick">✓</span><span class="big">${m.emoji}</span>${m.name}<small>${m.detail}</small></button>`}function quickChip(q){let on=edit.draft.quick.includes(q.id);return `<button class="quick-chip ${on?'selected':''}" onclick="toggleQuick('${q.id}')">${q.emoji} ${q.name}</button>`}function selectDayType(v){edit.draft.dayType=v;if(v!=='normal')edit.draft.main='';renderEditor()}function selectMain(v){edit.draft.dayType='normal';edit.draft.main=v;renderEditor()}function toggleQuick(v){let a=edit.draft.quick,i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);renderEditor()}function editorWhy(e,d){if(e.dayType==='repos')return{title:'Récupération prioritaire',text:'Tu récupères du travail physique et des séances précédentes.'};if(e.dayType==='foot')return{title:'Entraînement foot',text:'Le foot devient la séance principale. Pas de musculation en plus.'};if(e.dayType==='fatigue')return{title:'Journée allégée',text:'Mobilité, étirements et récupération seulement.'};let m=mainChoices.find(x=>x.id===e.main);if(m)return{title:m.name,text:m.detail+(e.quick.length?' • '+e.quick.length+' ajout(s) rapide(s).':'')};if(streakBefore(d)>=3)return{title:'Attention récupération',text:'Tu as déjà fait 3 jours d’affilée. Choisis repos ou exercice récupérateur.'};return{title:'Programme normal',text:'Séance adaptée à ton travail physique et à ta marche quotidienne.'}}function saveEditor(){let e=entry(edit.p,edit.d),d=edit.draft;e.dayType=d.dayType;e.main=d.main;e.quick=d.quick;e.done=d.done;save();document.getElementById('modal').classList.remove('show');render()}function cancelEditor(){document.getElementById('modal').classList.remove('show');edit=null}function gripCount(){let n=0;days.forEach(d=>{let e=entry('cheikh',d);if(e.quick.includes('grip'))n++;basePlan.cheikh[d].forEach((x,i)=>{if(/grip/i.test(x[1])&&e.base[i])n++})});return n}function pageToday(){let d=todayD(),g=gripCount();return `${profileCard('cheikh')}<div class="card blue"><h3>Aujourd’hui</h3>${dayCard('cheikh',d)}<button class="btn full" onclick="openEditor('cheikh','${d}')">Modifier ma journée</button></div><div class="card green"><h3>Grip : ${g}/3 cette semaine</h3><div class="bar0"><div class="bar" style="width:${Math.min(100,g/3*100)}%"></div></div></div><div class="card green"><h3>Yvane aujourd’hui</h3>${dayCard('yvane',d)}</div><div class="card orange"><h3>Nelvyn aujourd’hui</h3>${dayCard('nelvyn',d)}</div>`}function pageWeek(){return `<div class="card blue"><h3>Semaine Cheikh</h3><p class="muted">Choisis repos, normal, fatigué, entraînement foot ou une séance principale.</p></div><div class="list">${days.map(d=>dayCard('cheikh',d)).join('')}</div>`}function pageProfile(p){return `${profileCard(p)}<div class="list">${days.map(d=>dayCard(p,d)).join('')}</div>`}function pageNutrition(){let w=week(),k=new Date().toDateString(),o=w.water[k]=w.water[k]||{},mom=[['⏰','Réveil','1 grand verre d’eau'],['☀️','Matin','boire régulièrement'],['🍽️','Midi','repas normal + eau'],['💧','Après-midi','hydratation'],['🏃','Avant séance','eau + collation si besoin'],['💪','Après séance','récupération + eau'],['🌙','Soir','repas calme']];return `<div class="card blue"><h3>Nutrition / hydratation</h3><p class="muted">Cadre de journée, pas de menu imposé.</p></div><div class="list">${mom.map((m,i)=>`<div class="line ${o[i]?'done':''}"><div class="em">${m[0]}</div><div class="info"><b>${m[1]}</b><small>${m[2]}</small></div><button class="check ${o[i]?'on':''}" onclick="week().water['${k}'][${i}]=!week().water['${k}'][${i}];save();render()">✓</button></div>`).join('')}</div>`}function pageSuivi(){let ch=days.filter(d=>isDone('cheikh',d)).length,y=days.filter(d=>isDone('yvane',d)).length,n=days.filter(d=>isDone('nelvyn',d)).length,g=gripCount();return `<div class="card blue"><h3>Suivi semaine</h3><div class="grid3"><div class="stat"><b>${ch}</b><small>Cheikh</small></div><div class="stat"><b>${y}</b><small>Yvane</small></div><div class="stat"><b>${n}</b><small>Nelvyn</small></div></div><br><div class="card green"><h3>Grip ${g}/3</h3><div class="bar0"><div class="bar" style="width:${Math.min(100,g/3*100)}%"></div></div></div><button class="btn full" onclick="nextWeek()">Passer à la semaine suivante</button></div>`}function nextWeek(){if(!confirm('Passer à la semaine suivante ?'))return;let d=new Date(state.active||monday());d.setDate(d.getDate()+7);state.active=d.toISOString().slice(0,10);week();save();render()}function tab(t){current=t;document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));document.getElementById(t).classList.add('on');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('sel',b.dataset.t===t));scrollTo(0,0)}function render(){document.getElementById('today').innerHTML=pageToday();document.getElementById('week').innerHTML=pageWeek();document.getElementById('cheikh').innerHTML=pageProfile('cheikh');document.getElementById('yvane').innerHTML=pageProfile('yvane');document.getElementById('nutrition').innerHTML=pageNutrition();document.getElementById('suivi').innerHTML=pageSuivi();tab(current)}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>tab(b.dataset.t));document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')cancelEditor()};render();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));</script></body></html>
