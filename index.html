<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">

<title>Coach Magic</title>
<style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#10243f,#050912 48%,#02040a);color:#f7f9ff;font-family:system-ui,Arial,sans-serif;padding-bottom:90px}.app{max-width:560px;margin:auto;padding:14px}.top{position:sticky;top:0;z-index:5;margin:-14px -14px 14px;padding:12px 14px;background:#07101ff2;backdrop-filter:blur(14px);border-bottom:1px solid #ffffff22}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{font-size:21px;font-weight:1000}.brand b{color:#2f80ff}.brand i{color:#ff4242;font-style:normal}.ib{width:46px;height:46px;border-radius:17px;border:1px solid #ffffff22;background:#101b2d;color:white;font-size:22px}.page{display:none;gap:12px}.page.on{display:grid}.card{background:linear-gradient(145deg,#111d31,#08111f);border:1px solid #ffffff22;border-radius:22px;padding:14px;box-shadow:0 14px 35px #0008}.blue{border-color:#2f80ff88}.green{border-color:#86e44e88}.orange{border-color:#ff9d2e88}.muted{color:#aab6c8}.hero{display:flex;gap:13px;align-items:center}.avatar{width:78px;height:78px;border-radius:24px;background:#050912;border:2px solid #2f80ff99;display:grid;place-items:center;font-weight:1000;font-size:22px}.pill{display:inline-block;border:1px solid #2f80ff88;background:#2f80ff22;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:1000;letter-spacing:.03em}.base{background:#2f80ff30;color:#9ec5ff;border:1px solid #2f80ff88}.spec{background:#ff9d2e25;color:#ffd49c;border:1px solid #ff9d2e88}.add{background:#86e44e22;color:#c8ffad;border:1px solid #86e44e88}.list{display:grid;gap:10px}.day,.line{display:flex;gap:10px;align-items:center;background:#ffffff0b;border:1px solid #ffffff22;border-radius:18px;padding:11px}.day.done,.line.done{border-color:#86e44e}.today{border-color:#2f80ff;background:#2f80ff18}.em{width:48px;height:48px;border-radius:15px;background:#020912;display:grid;place-items:center;font-size:25px;flex:none}.info{flex:1;min-width:0}.info b{display:block}.info small{color:#b8c3d2;line-height:1.35}.btn{border:0;border-radius:15px;padding:12px;background:#2f80ff;color:white;font-weight:1000}.btn.full{width:100%;margin-top:9px}.btn.small{padding:9px 10px;font-size:12px}.ghost{background:transparent;border:1px solid #2f80ff88}.ok{background:#86e44e;color:#061006}.warn{background:#ff9d2e18;border:1px solid #ff9d2e66;color:#ffd8a8;border-radius:16px;padding:10px}.check{width:32px;height:32px;border-radius:50%;border:2px solid #ffffff55;background:transparent;color:white;font-weight:1000}.check.on{background:#86e44e;color:#061006;border-color:#86e44e}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.quick{min-height:70px;text-align:left;border:1px solid #ffffff22;border-radius:17px;background:#ffffff0d;color:white;padding:10px;font-weight:900}.quick span{display:block;font-size:23px}.bar0{height:10px;background:#ffffff22;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#2f80ff,#86e44e)}.nav{position:fixed;bottom:0;left:0;right:0;background:#07101ff2;border-top:1px solid #ffffff22;padding:7px 4px}.navin{max-width:560px;margin:auto;display:grid;grid-template-columns:repeat(6,1fr);gap:2px}.nav button{background:0;border:0;color:#aab6c8;border-radius:14px;padding:7px 2px;font-size:10px;font-weight:900}.nav button.sel{background:#2f80ff33;color:white}.nav span{display:block;font-size:20px}.modal{position:fixed;inset:0;display:none;align-items:end;justify-content:center;background:#000b;z-index:9;padding:10px}.modal.show{display:flex}.sheet{width:min(560px,100%);max-height:93vh;overflow:auto;background:#07101f;border:1px solid #ffffff22;border-radius:25px;padding:14px}input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #ffffff22;background:#101b2d;color:white}textarea{min-height:78px}label{display:block;margin:8px 0 4px;font-size:12px;font-weight:900;color:#dbe6fa}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.seg button{border:1px solid #ffffff22;background:#ffffff0b;color:white;border-radius:14px;padding:10px;font-weight:900}.seg button.on{border-color:#86e44e;background:#86e44e22}.icons{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.ico{height:44px;border:1px solid #ffffff22;border-radius:14px;background:#ffffff0b;color:white;font-size:23px}.ico.on{border-color:#86e44e;background:#86e44e22}.picked{display:flex;align-items:center;gap:10px;margin:8px 0}.picked strong{font-size:28px;background:#020912;border-radius:14px;width:48px;height:48px;display:grid;place-items:center;border:1px solid #ffffff22}.stat{text-align:center;background:#ffffff0b;border:1px solid #ffffff22;border-radius:16px;padding:12px}.stat b{display:block;font-size:22px}@media(max-width:380px){.grid{grid-template-columns:1fr}.brand{font-size:18px}.btn.small{padding:8px 7px}.icons{grid-template-columns:repeat(5,1fr)}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div class="row"><button class="ib" onclick="tab('week')">☰</button><div class="brand">Coach <b>Semaine</b> <i>CHK</i></div><button class="ib" onclick="nextWeek()">↻</button></div></header>
<section id="today" class="page on"></section><section id="week" class="page"></section><section id="cheikh" class="page"></section><section id="yvane" class="page"></section><section id="nutrition" class="page"></section><section id="suivi" class="page"></section>
</main>
<nav class="nav"><div class="navin"><button data-t="today" class="sel"><span>🏠</span>Aujourd’hui</button><button data-t="week"><span>📅</span>Semaine</button><button data-t="cheikh"><span>👤</span>Cheikh</button><button data-t="yvane"><span>⚽</span>Yvane</button><button data-t="nutrition"><span>💧</span>Nutrition</button><button data-t="suivi"><span>📈</span>Suivi</button></div></nav>
<div id="modal" class="modal"><div id="sheet" class="sheet"></div></div>
<script>
const days=['mon','tue','wed','thu','fri','sat','sun'];
const names={mon:'Lundi',tue:'Mardi',wed:'Mercredi',thu:'Jeudi',fri:'Vendredi',sat:'Samedi',sun:'Dimanche'};
const todayMap={1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat',0:'sun'};
const people={cheikh:['CHK','Cheikh','blue','Force • endurance • travail physique'],yvane:['YV','Yvane','green','Foot • technique • gardien'],nelvyn:['NV','Nelvyn','orange','Missions • fun • étoiles']};
const iconSet=['➕','✊','💪','🟢','🧱','⚙️','🧘','⚽','🥅','🎯','🏃','🚴','🧗','💧','🍽️','🛌','⭐','🎮'];
const basePlan={
cheikh:{mon:[['🚴','Vélo elliptique','15 min'],['🟢','Élastiques','10 min'],['✊','Grip léger','6–8 min'],['🧘','Étirements','5 min']],tue:[['🏃','Tapis fractionné','30 min'],['💪','Pompes','3 séries'],['🧘','Étirements','5–8 min']],wed:[['🧗','Monte escalier','15 min'],['💪','Pompes','3–4 x 10'],['🧱','Gainage','3–4 x 30 sec'],['⚙️','Roue abdos','3 x 5–8'],['✊','Grip normal','8–10 min']],thu:[['🛌','Repos actif','10–15 min'],['🧘','Mobilité hanches/adducteurs','douce']],fri:[['🟦','Séance légère selon jeudi','20–30 min'],['💪','Pompes légères','option'],['🧘','Étirements','5–10 min']],sat:[['🚴','Vélo elliptique','15 min'],['🟢','Élastiques','10 min'],['✊','Grip','6–10 min'],['🧘','Étirements','10 min']],sun:[['🛌','Repos complet','récupération']]},
yvane:{mon:[['🏫','Foot école midi','12h–13h'],['🥅','Gardien','20 min'],['🎯','Frappes','20 min'],['⚽','Technique ballon','10–15 min']],tue:[['🛌','Repos','récupération']],wed:[['⚽','Technique ballon','20–25 min'],['🧠','Tactique simple','3 questions']],thu:[['🥅','Gardien ou entraînement club','option'],['🎯','Frappes précision','10–15 min']],fri:[['🛌','Repos','récupération']],sat:[['🎮','Jeu libre ballon','plaisir']],sun:[['🛌','Repos','récupération']]},
nelvyn:{mon:[['🎯','Mission précision','5–10 min']],tue:[['🛌','Repos','récupération']],wed:[['⚽','Défi ballon','10 min']],thu:[['⭐','Mission fun','5–10 min']],fri:[['🛌','Repos','récupération']],sat:[['🏃','Parcours vitesse','8 min']],sun:[['🛌','Repos','récupération']]}
};
const quick={cheikh:[['✊','Grip poignée','8 min','3 séries par main'],['💪','Pompes','8 min','3 x 10'],['🟢','Élastiques','10 min','haut du corps'],['🧱','Gainage','5 min','3 x 30 sec'],['⚙️','Roue abdos','6 min','3 x 6'],['🧘','Étirements','10 min','adducteurs/dos'],['⚽','Entraînement foot','60 min','foot uniquement']],yvane:[['🏫','Foot école','60 min','gardien/frappes/technique'],['🥅','Gardien','20 min','arrêts + relances'],['🎯','Frappes','20 min','précision'],['⚽','Technique ballon','20 min','conduite'],['🧠','Tactique','15 min','3 questions']],nelvyn:[['🎯','Mission précision','8 min','viser cible'],['⚽','Défi ballon','10 min','passes'],['🏃','Parcours vitesse','8 min','slalom'],['🎮','Jeu libre','10 min','plaisir']]};
let state=JSON.parse(localStorage.getItem('coachMagicV5')||'{}'),current='today',edit={p:'cheikh',d:'mon'},selectedIcon='➕';
function save(){localStorage.setItem('coachMagicV5',JSON.stringify(state))}
function monday(){let d=new Date(),n=d.getDay()||7;d.setDate(d.getDate()-n+1);return d.toISOString().slice(0,10)}
function week(){state.weeks=state.weeks||{};state.active=state.active||monday();state.tpl=state.tpl||{};if(!state.weeks[state.active])state.weeks[state.active]={entries:{},water:{}};return state.weeks[state.active]}
function entry(p,d){let w=week(),k=p+'_'+d;if(!w.entries[k])w.entries[k]={base:{},extra:[],training:false,mode:'normal',fatigue:'normal',note:'',done:false};return w.entries[k]}
function todayD(){return todayMap[new Date().getDay()]}
function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function isDone(p,d){let e=entry(p,d);return e.done||Object.values(e.base).some(Boolean)||e.extra.some(x=>x.ok)}
function extras(p,d){return (state.tpl[p+'_'+d]||[]).concat(entry(p,d).extra)}
function hasTraining(d){let e=entry('cheikh',d);return e.training||e.extra.some(x=>/foot|entraînement/i.test(x.name))}
function streakBefore(d){let i=days.indexOf(d),n=0;for(let j=i-1;j>=0;j--){if(isDone('cheikh',days[j])||hasTraining(days[j]))n++;else break}return n}
function plan(p,d){let e=entry(p,d),items=basePlan[p][d].map(x=>({emoji:x[0],name:x[1],detail:x[2]})),spec=[];
 if(p==='cheikh'){
  let i=days.indexOf(d),prev=i>0?days[i-1]:null;
  if(e.training||hasTraining(d)){items=[{emoji:'⚽',name:'Entraînement foot',detail:'foot uniquement'}];spec.push('Entraînement déclaré : pas de musculation en plus.');spec.push('Le lendemain doit être récupération.');}
  else if(prev&&hasTraining(prev)){items=[{emoji:'🛌',name:'Repos récupération',detail:'10–15 min mobilité douce'}];spec.push('Repos automatique après entraînement la veille.');}
  else if(streakBefore(d)>=3){items=[{emoji:'🛌',name:'Repos obligatoire',detail:'étirements doux + mobilité'}];spec.push('Déjà 3 jours d’affilée.');spec.push('Travail physique + marche quotidienne pris en compte.');}
  else if(e.mode==='rest'||e.fatigue==='tres'){items=[{emoji:'🛌',name:'Repos + mobilité',detail:'10 min'}];spec.push('Mode très fatigué ou repos activé.');}
  else if(e.mode==='light'||e.fatigue==='fatigue'){items=items.slice(0,2).concat([{emoji:'🧘',name:'Étirements doux',detail:'5–10 min'}]);spec.push('Séance allégée : volume réduit.');}
  if(e.fatigue==='fatigue')spec.push('Fatigue signalée : garde de la marge.');
 }
 if(p==='yvane'){spec.push('Deux séances extra maximum dans la semaine.');if(d==='mon')spec.push('Foot école 12h–13h : gardien + frappes + technique.');}
 if(p==='nelvyn')spec.push('Format mission courte et ludique.');
 if(e.note)spec.push('Note : '+e.note);
 return {items,spec};
}
function addExtra(p,d,a,scope='today'){let obj={id:uid(),emoji:a[0],name:a[1],dur:a[2],detail:a[3],ok:true};let arr=scope==='always'?(state.tpl[p+'_'+d]=state.tpl[p+'_'+d]||[]):entry(p,d).extra;arr.push(obj);if(/foot|entraînement/i.test(obj.name)&&p==='cheikh')entry(p,d).training=true;save();render();openEdit(p,d)}
function quickAdd(p,d,a){addExtra(p,d,a,'today')}
function toggleBase(p,d,i){let e=entry(p,d);e.base[i]=!e.base[i];save();render();if(modal.classList.contains('show'))openEdit(p,d)}
function toggleExtra(p,d,idv){let x=entry(p,d).extra.find(a=>a.id===idv)||(state.tpl[p+'_'+d]||[]).find(a=>a.id===idv);if(x)x.ok=!x.ok;save();render();if(modal.classList.contains('show'))openEdit(p,d)}
function removeExtra(p,d,idv){entry(p,d).extra=entry(p,d).extra.filter(a=>a.id!==idv);state.tpl[p+'_'+d]=(state.tpl[p+'_'+d]||[]).filter(a=>a.id!==idv);save();render();openEdit(p,d)}
function setMode(p,d,m){entry(p,d).mode=m;if(m==='rest')entry(p,d).training=false;save();render();openEdit(p,d)}
function setFatigue(p,d,f){entry(p,d).fatigue=f;save();render();openEdit(p,d)}
function setTraining(p,d,v){entry(p,d).training=v;save();render();openEdit(p,d)}
function pickIcon(v){selectedIcon=v;document.getElementById('selectedIcon').textContent=v;document.querySelectorAll('.ico').forEach(b=>b.classList.toggle('on',b.dataset.icon===v))}
function addCustom(){let p=edit.p,d=edit.d,n=document.getElementById('customName').value.trim();if(!n)return alert('Nom obligatoire');addExtra(p,d,[selectedIcon,n,document.getElementById('customDur').value.trim(),document.getElementById('customDetail').value.trim()],document.getElementById('customScope').value)}
function profileCard(p){let a=people[p];return `<div class="card ${a[2]}"><div class="hero"><div class="avatar">${a[0]}</div><div><h2>${a[1]}</h2><p class="muted">${a[3]}</p><span class="pill">Base + spécificités + ajouts</span></div></div></div>`}
function dayCard(p,d){let pl=plan(p,d),e=entry(p,d),ex=extras(p,d),done=isDone(p,d);let baseTxt=pl.items.map(x=>x.name).slice(0,2).join(' + '),specTxt=pl.spec[0]||'Programme normal';return `<div class="day ${d===todayD()?'today':''} ${done?'done':''}"><div class="em">${pl.items[0]?.emoji||'✅'}</div><div class="info"><b>${names[d]}${e.training?' • entraînement':''}</b><small><span class="badge base">BASE</span> ${esc(baseTxt)}<br><span class="badge spec">SPÉCIFICITÉS</span> ${esc(specTxt)}${ex.length?`<br><span class="badge add">AJOUTS</span> ${ex.length} ajout(s)`:''}</small></div><button class="btn ghost small" onclick="openEdit('${p}','${d}')">Modifier</button><button class="check ${done?'on':''}" onclick="entry('${p}','${d}').done=!entry('${p}','${d}').done;save();render()">✓</button></div>`}
function openEdit(p='cheikh',d=todayD()){edit={p,d};selectedIcon='➕';let e=entry(p,d),pl=plan(p,d),ex=extras(p,d);document.getElementById('sheet').innerHTML=`<div class="row"><div><h2>Modifier ${people[p][1]} — ${names[d]}</h2><p class="muted">Base, spécificités et ajouts sont séparés.</p></div><button class="btn ghost small" onclick="closeEdit()">Fermer</button></div>
<div class="card blue"><h3><span class="badge base">1. PROGRAMME DE BASE</span></h3><p class="muted">Ce que l’application prévoit normalement.</p><div class="list">${pl.items.map((x,i)=>`<div class="line ${e.base[i]?'done':''}"><div class="em">${x.emoji}</div><div class="info"><b>${esc(x.name)}</b><small>${esc(x.detail)}</small></div><button class="check ${e.base[i]?'on':''}" onclick="toggleBase('${p}','${d}',${i})">✓</button></div>`).join('')}</div></div>
<div class="card orange"><h3><span class="badge spec">2. SPÉCIFICITÉS DU JOUR</span></h3><p class="muted">Ce qui change la journée : foot, fatigue, repos, 3 jours d’affilée.</p><div class="list">${(pl.spec.length?pl.spec:['Aucune spécificité : programme normal.']).map(s=>`<div class="warn">${esc(s)}</div>`).join('')}</div>${p==='cheikh'?`<div class="grid" style="margin-top:10px"><button class="btn ghost" onclick="setTraining('${p}','${d}',true)">J’ai entraînement</button><button class="btn ghost" onclick="setTraining('${p}','${d}',false)">Pas entraînement</button><button class="btn ghost" onclick="setMode('${p}','${d}','light')">Alléger</button><button class="btn ghost" onclick="setMode('${p}','${d}','rest')">Repos</button></div><label>Fatigue</label><div class="seg">${['normal','fatigue','tres'].map(f=>`<button class="${e.fatigue===f?'on':''}" onclick="setFatigue('${p}','${d}','${f}')">${f==='normal'?'Normal':f==='fatigue'?'Fatigué':'Très fatigué'}</button>`).join('')}</div>`:''}</div>
<div class="card green"><h3><span class="badge add">3. AJOUTS MANUELS</span></h3><p class="muted">Ce que tu rajoutes toi-même.</p><div class="list">${ex.length?ex.map(x=>`<div class="line ${x.ok?'done':''}"><div class="em">${x.emoji}</div><div class="info"><b>${esc(x.name)}</b><small>${esc(x.dur)} ${esc(x.detail)}</small></div><button class="check ${x.ok?'on':''}" onclick="toggleExtra('${p}','${d}','${x.id}')">✓</button><button class="btn ghost small" onclick="removeExtra('${p}','${d}','${x.id}')">Suppr.</button></div>`).join(''):'<div class="warn">Aucun ajout manuel pour ce jour.</div>'}</div></div>
<div class="card"><h3>Ajouter rapidement</h3><div class="grid">${quick[p].map(a=>`<button class="quick" onclick='quickAdd("${p}","${d}",${JSON.stringify(a)})'><span>${a[0]}</span>${a[1]}<br><small>${a[2]} • ${a[3]}</small></button>`).join('')}</div></div>
<div class="card"><h3>Activité libre</h3><label>Icône</label><div class="picked"><strong id="selectedIcon">➕</strong><span class="muted">Choisis une icône sans clavier.</span></div><div class="icons">${iconSet.map(ic=>`<button class="ico ${ic==='➕'?'on':''}" data-icon="${ic}" onclick="pickIcon('${ic}')">${ic}</button>`).join('')}</div><label>Nom de l’activité</label><input id="customName" placeholder="ex : Grip avec pince"><label>Durée</label><input id="customDur" placeholder="ex : 8 min"><label>Détails</label><textarea id="customDetail" placeholder="ex : 3 séries par main"></textarea><label>Sauvegarder</label><select id="customScope"><option value="today">Aujourd’hui seulement</option><option value="always">Tous les ${names[d]}s</option></select><button class="btn ok full" onclick="addCustom()">Ajouter en spécifique</button></div>
<div class="card"><h3>Note du jour</h3><textarea id="noteBox" placeholder="Jambes lourdes, poignet fatigué, bonne énergie...">${esc(e.note)}</textarea><button class="btn full" onclick="entry('${p}','${d}').note=document.getElementById('noteBox').value;save();render();openEdit('${p}','${d}')">Enregistrer la note</button></div>`;document.getElementById('modal').classList.add('show')}
function closeEdit(){document.getElementById('modal').classList.remove('show');render()}
function gripCount(){let n=0;days.forEach(d=>{let pl=plan('cheikh',d),e=entry('cheikh',d);pl.items.forEach((x,i)=>{if(/grip|poignée/i.test(x.name)&&e.base[i])n++});extras('cheikh',d).forEach(x=>{if(x.ok&&/grip|poignée/i.test(x.name))n++})});return n}
function pageToday(){let d=todayD(),g=gripCount();return `${profileCard('cheikh')}<div class="card blue"><h3>Aujourd’hui</h3>${dayCard('cheikh',d)}<button class="btn full" onclick="openEdit('cheikh','${d}')">Modifier ma journée</button></div><div class="card green"><h3>Grip : ${g}/3 cette semaine</h3><div class="bar0"><div class="bar" style="width:${Math.min(100,g/3*100)}%"></div></div></div><div class="card green"><h3>Yvane aujourd’hui</h3>${dayCard('yvane',d)}</div><div class="card orange"><h3>Nelvyn aujourd’hui</h3>${dayCard('nelvyn',d)}</div>`}
function pageWeek(){return `<div class="card blue"><h3>Semaine Cheikh</h3><p class="muted">Chaque jour affiche : BASE, SPÉCIFICITÉS, AJOUTS.</p></div><div class="list">${days.map(d=>dayCard('cheikh',d)).join('')}</div>`}
function pageProfile(p){return `${profileCard(p)}<div class="list">${days.map(d=>dayCard(p,d)).join('')}</div>`}
function pageNutrition(){let w=week(),k=new Date().toDateString(),o=w.water[k]=w.water[k]||{},mom=[['⏰','Réveil','1 grand verre d’eau'],['☀️','Matin','boire régulièrement'],['🍽️','Midi','repas normal + eau'],['💧','Après-midi','hydratation'],['🏃','Avant séance','eau + collation si besoin'],['💪','Après séance','récupération + eau'],['🌙','Soir','repas calme']];return `<div class="card blue"><h3>Nutrition / hydratation</h3><p class="muted">Cadre de journée, pas de menu imposé.</p></div><div class="list">${mom.map((m,i)=>`<div class="line ${o[i]?'done':''}"><div class="em">${m[0]}</div><div class="info"><b>${m[1]}</b><small>${m[2]}</small></div><button class="check ${o[i]?'on':''}" onclick="week().water['${k}'][${i}]=!week().water['${k}'][${i}];save();render()">✓</button></div>`).join('')}</div>`}
function pageSuivi(){let ch=days.filter(d=>isDone('cheikh',d)).length,y=days.filter(d=>isDone('yvane',d)).length,n=days.filter(d=>isDone('nelvyn',d)).length,g=gripCount();return `<div class="card blue"><h3>Suivi semaine</h3><div class="grid3"><div class="stat"><b>${ch}</b><small>Cheikh</small></div><div class="stat"><b>${y}</b><small>Yvane</small></div><div class="stat"><b>${n}</b><small>Nelvyn</small></div></div><br><div class="card green"><h3>Grip ${g}/3</h3><div class="bar0"><div class="bar" style="width:${Math.min(100,g/3*100)}%"></div></div></div><button class="btn full" onclick="nextWeek()">Passer à la semaine suivante</button></div>`}
function nextWeek(){if(!confirm('Passer à la semaine suivante ?'))return;let d=new Date(state.active||monday());d.setDate(d.getDate()+7);state.active=d.toISOString().slice(0,10);week();save();render()}
function tab(t){current=t;document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));document.getElementById(t).classList.add('on');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('sel',b.dataset.t===t));scrollTo(0,0)}
function render(){document.getElementById('today').innerHTML=pageToday();document.getElementById('week').innerHTML=pageWeek();document.getElementById('cheikh').innerHTML=pageProfile('cheikh');document.getElementById('yvane').innerHTML=pageProfile('yvane');document.getElementById('nutrition').innerHTML=pageNutrition();document.getElementById('suivi').innerHTML=pageSuivi();tab(current)}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>tab(b.dataset.t));document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeEdit()};render();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
</script>
</body>
</html>
