<!doctype html><html lang='fr'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><meta name='theme-color' content='#07101f'><link rel='manifest' href='manifest.webmanifest'><title>Coach Magic</title><style>
*{box-sizing:border-box}body{margin:0;background:#050912;color:#f7f9ff;font-family:system-ui,Arial;padding-bottom:82px}.app{max-width:560px;margin:auto;padding:14px}.top{position:sticky;top:0;background:#07101fee;backdrop-filter:blur(14px);z-index:5;margin:-14px -14px 14px;padding:12px 14px;border-bottom:1px solid #ffffff22}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{font-size:22px;font-weight:1000}.brand b{color:#2f80ff}.brand i{color:#ff4040;font-style:normal}.ib{width:46px;height:46px;border-radius:17px;border:1px solid #ffffff22;background:#101b2d;color:white;font-size:22px}.page{display:none;gap:12px}.on{display:grid}.card{background:linear-gradient(145deg,#111d31,#08111f);border:1px solid #ffffff22;border-radius:22px;padding:14px;box-shadow:0 14px 35px #0008}.blue{border-color:#2f80ff88}.green{border-color:#86e44e88}.orange{border-color:#ff9d2e88}.muted{color:#aab6c8}.avatar{width:82px;height:82px;border-radius:23px;border:2px solid #2f80ff88;display:grid;place-items:center;background:#050912;font-weight:1000;font-size:24px}.hero{display:flex;gap:13px;align-items:center}.list{display:grid;gap:10px}.day,.act{display:flex;gap:10px;align-items:center;background:#ffffff0b;border:1px solid #ffffff22;border-radius:18px;padding:11px}.done{border-color:#86e44e}.today{border-color:#2f80ff;background:#2f80ff18}.em{width:48px;height:48px;border-radius:15px;background:#020912;display:grid;place-items:center;font-size:25px;flex:none}.info{flex:1}.info b{display:block}.info small{color:#b8c3d2}.btn{border:0;border-radius:15px;padding:12px;background:#2f80ff;color:white;font-weight:1000}.btn.full{width:100%;margin-top:9px}.ghost{background:transparent;border:1px solid #2f80ff88}.ok{background:#86e44e;color:#061006}.orangeb{background:#ff9d2e}.check{width:32px;height:32px;border-radius:50%;border:2px solid #ffffff55;background:transparent;color:white;font-weight:1000}.check.on{background:#86e44e;color:#061006;border-color:#86e44e}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.quick{min-height:65px;text-align:left;border:1px solid #ffffff22;border-radius:17px;background:#ffffff0d;color:white;padding:10px;font-weight:900}.quick span{display:block;font-size:23px}.bar0{height:10px;background:#ffffff22;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#2f80ff,#86e44e)}.nav{position:fixed;bottom:0;left:0;right:0;background:#07101ff2;border-top:1px solid #ffffff22;padding:7px 4px}.navin{max-width:560px;margin:auto;display:grid;grid-template-columns:repeat(6,1fr);gap:2px}.nav button{background:0;border:0;color:#aab6c8;border-radius:14px;padding:7px 2px;font-size:10px;font-weight:900}.nav button.sel{background:#2f80ff33;color:white}.nav span{display:block;font-size:20px}.modal{position:fixed;inset:0;display:none;align-items:end;justify-content:center;background:#000b;z-index:9;padding:10px}.modal.show{display:flex}.sheet{width:min(560px,100%);max-height:92vh;overflow:auto;background:#07101f;border:1px solid #ffffff22;border-radius:25px;padding:14px}input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #ffffff22;background:#101b2d;color:white}textarea{min-height:80px}label{display:block;margin:8px 0 4px;font-size:12px;font-weight:900;color:#dbe6fa}@media(max-width:380px){.grid{grid-template-columns:1fr}.brand{font-size:18px}}
</style></head><body><main class='app'><header class='top'><div class='row'><button class='ib' onclick="tab('week')">☰</button><div class='brand'>Coach <b>Semaine</b> <i>CHK</i></div><button class='ib' onclick='nextWeek()'>↻</button></div></header><section id='today' class='page on'></section><section id='week' class='page'></section><section id='cheikh' class='page'></section><section id='yvane' class='page'></section><section id='nutrition' class='page'></section><section id='suivi' class='page'></section></main><nav class='nav'><div class='navin'><button data-t='today' class='sel'><span>🏠</span>Aujourd’hui</button><button data-t='week'><span>📅</span>Semaine</button><button data-t='cheikh'><span>👤</span>Cheikh</button><button data-t='yvane'><span>⚽</span>Yvane</button><button data-t='nutrition'><span>💧</span>Nutrition</button><button data-t='suivi'><span>📈</span>Suivi</button></div></nav><div id='ed' class='modal'><div class='sheet' id='sheet'></div></div><script>
const D=['mon','tue','wed','thu','fri','sat','sun'],N={mon:'Lundi',tue:'Mardi',wed:'Mercredi',thu:'Jeudi',fri:'Vendredi',sat:'Samedi',sun:'Dimanche'},I={1:'mon',2:'tue',3:'wed',4:'thu',5:'fri',6:'sat',0:'sun'},P={cheikh:['CHK','Cheikh','blue'],yvane:['YV','Yvane','green'],nelvyn:['NV','Nelvyn','orange']};
const BASE={cheikh:{mon:['🚴','Vélo elliptique + élastiques','15 min + grip léger',['Vélo 15 min','Élastiques','Grip léger','Étirements']],tue:['🏃','Tapis fractionné','30 min + pompes',['Tapis 30 min','Pompes','Étirements']],wed:['🧗','Monte escalier + circuit','pompes/gainage/roue + grip',['Monte escalier','Pompes','Gainage','Roue abdos','Grip normal']],thu:['🛌','Repos ou entraînement','repos si 3 jours faits',['Mobilité','Adducteurs','Dos']],fri:['🟦','Repos ou léger','selon jeudi',['Tapis léger','Pompes légères','Étirements']],sat:['🚴','Vélo + élastiques','15 min + grip',['Vélo','Élastiques','Grip','Étirements']],sun:['🛌','Repos complet','récupération',['Repos']]},yvane:{mon:['🏫','Foot école midi','gardien + frappes + technique',['Gardien','Frappes','Technique']],wed:['⚽','Technique + tactique','20–25 min',['Conduite','Contrôle','Questions tactiques']],thu:['🥅','Gardien ou club','option entraînement',['Prise de balle','Relances']],tue:['🛌','Repos','récupération',['Repos']],fri:['🛌','Repos','récupération',['Repos']],sat:['🎮','Jeu libre','ballon détente',['Plaisir']],sun:['🛌','Repos','récupération',['Repos']]},nelvyn:{mon:['🎯','Mission précision','5–10 min',['Cibles','Passes']],wed:['⚽','Défi ballon','10 min',['Conduite','Passe']],thu:['⭐','Mission fun','5–10 min',['Défi libre']],sat:['🏃','Parcours vitesse','8 min',['Slalom']],tue:['🛌','Repos','récupération',['Repos']],fri:['🛌','Repos','récupération',['Repos']],sun:['🛌','Repos','récupération',['Repos']]}};
const Q={cheikh:[['✊','Grip poignée','8 min','3 séries/main'],['💪','Pompes','8 min','3 x 10'],['🟢','Élastiques','10 min','haut du corps'],['🧱','Gainage','5 min','3 x 30 sec'],['⚙️','Roue abdos','6 min','3 x 6'],['🧘','Étirements','10 min','adducteurs/dos'],['⚽','Entraînement foot','60 min','foot uniquement']],yvane:[['🏫','Foot école','60 min','gardien/frappes/technique'],['🥅','Gardien','20 min','arrêts + relances'],['🎯','Frappes','20 min','précision'],['⚽','Technique ballon','20 min','conduite'],['🧠','Tactique','15 min','3 questions']],nelvyn:[['🎯','Mission précision','8 min','viser cible'],['⚽','Défi ballon','10 min','passes'],['🏃','Parcours vitesse','8 min','slalom'],['🎮','Jeu libre','10 min','plaisir']]};
let S=JSON.parse(localStorage.cmV3||'{}'),cur='today',edit={p:'cheikh',d:'mon'};function save(){localStorage.cmV3=JSON.stringify(S)}function week0(){let d=new Date,n=d.getDay()||7;d.setDate(d.getDate()-n+1);return d.toISOString().slice(0,10)}function W(){S.w=S.w||{};S.a=S.a||week0();S.tpl=S.tpl||{};if(!S.w[S.a])S.w[S.a]={e:{},water:{}};save();return S.w[S.a]}function E(p,d){let k=p+'_'+d,w=W();if(!w.e[k])w.e[k]={x:[],c:{},note:'',fat:'normal',mode:'normal'};return w.e[k]}function tk(){return I[new Date().getDay()]}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function tr(d){return E('cheikh',d).x.some(a=>/foot|entraînement/i.test(a.n))}function streak(d){let i=D.indexOf(d),n=0;for(let j=i-1;j>=0;j--){if(done('cheikh',D[j])||tr(D[j]))n++;else break}return n}function plan(p,d){let e=E(p,d),b=BASE[p][d];if(p==='cheikh'){let i=D.indexOf(d),pr=i>0?D[i-1]:'';if(tr(d))return ['⚽','Entraînement foot','pas de musculation en plus',['Foot uniquement'],'Foot déclaré : récupération prioritaire.'];if(pr&&tr(pr))return ['🛌','Repos récupération','après entraînement',['Mobilité douce'],'La veille contient foot.'];if(streak(d)>=3)return ['🛌','Repos obligatoire','3 jours d’affilée',['Repos + étirements'],'Travail physique + 3 jours : repos.'];if(e.fat==='tres'||e.mode==='rest')return ['🛌','Repos + mobilité','très fatigué',['Respiration','Mobilité'],'Mode fatigue activé.'];if(e.fat==='fatigue'||e.mode==='light')return [b[0],b[1],b[2]+' réduit',b[3].slice(0,2).concat(['Étirements doux']),'Séance allégée.']}return [...b,'Programme de base personnalisé.']}function items(p,d){let e=E(p,d),pl=plan(p,d);return pl[3].map((n,i)=>({id:'b'+i,n,em:'✅',src:'base'})).concat((S.tpl[p+'_'+d]||[]),e.x)}function done(p,d){let e=E(p,d);return e.done||Object.values(e.c).some(Boolean)||e.x.some(a=>a.ok)}function addAct(p,d,a,scope){let o={id:uid(),em:a[0],n:a[1],dur:a[2],det:a[3],ok:true,src:'x'};if(scope==='always'){S.tpl[p+'_'+d]=S.tpl[p+'_'+d]||[];S.tpl[p+'_'+d].push(o)}else E(p,d).x.push(o);save();render();openEd(p,d)}function toggle(p,d,id,extra){let e=E(p,d);if(extra){let a=e.x.find(z=>z.id===id);if(a)a.ok=!a.ok}else e.c[id]=!e.c[id];save();render();if(ed.classList.contains('show'))openEd(p,d)}function rem(p,d,id){E(p,d).x=E(p,d).x.filter(a=>a.id!==id);save();render();openEd(p,d)}function setFat(p,d,v){E(p,d).fat=v;save();render();openEd(p,d)}function setMode(p,d,v){E(p,d).mode=v;save();render();openEd(p,d)}function custom(){let p=edit.p,d=edit.d;if(!cn.value.trim())return alert('Nom obligatoire');addAct(p,d,[ce.value||'➕',cn.value.trim(),cd.value.trim(),ct.value.trim()],cs.value)}
function openEd(p='cheikh',d=tk()){edit={p,d};let e=E(p,d),pl=plan(p,d),qs=Q[p],its=items(p,d);sheet.innerHTML=`<div class='row'><div><h2>Modifier ${P[p][1]} — ${N[d]}</h2><p class='muted'>Ajoute ce que tu fais vraiment.</p></div><button class='btn ghost small' onclick='closeEd()'>Fermer</button></div><div class='card ${P[p][2]}'><b>${pl[0]} ${esc(pl[1])}</b><p class='muted'>${esc(pl[2])}</p><div class='warn'>Pourquoi ? ${esc(pl[4])}</div></div><div class='card'><h3>Actions rapides</h3><div class='grid'>${qs.map(a=>`<button class='quick' onclick='addAct("${p}","${d}",${JSON.stringify(a)},"today")'><span>${a[0]}</span>${a[1]}<br><small>${a[2]} • ${a[3]}</small></button>`).join('')}</div></div><div class='card'><h3>Mode</h3><div class='grid'><button class='btn ghost' onclick="setMode('${p}','${d}','normal')">Garder</button><button class='btn ghost' onclick="setMode('${p}','${d}','light')">Alléger</button><button class='btn ghost' onclick="addAct('${p}','${d}',['⚽','Entraînement foot','60 min','foot uniquement'],'today')">Foot</button><button class='btn ghost' onclick="setMode('${p}','${d}','rest')">Repos</button></div><label>Fatigue</label><div class='seg'>${['normal','fatigue','tres'].map(v=>`<button class='${e.fat===v?'on':''}' onclick="setFat('${p}','${d}','${v}')">${v==='normal'?'Normal':v==='fatigue'?'Fatigué':'Très fatigué'}</button>`).join('')}</div></div><div class='card'><h3>Ce que j’ai vraiment fait</h3><div class='list'>${its.map(a=>`<div class='act ${a.src==='x'?a.ok:e.c[a.id]?'done':''}'><div class='em'>${a.em||'✅'}</div><div class='info'><b>${esc(a.n)}</b><small>${esc(a.dur||'')} ${esc(a.det||'')}</small></div><button class='check ${a.src==='x'?a.ok:e.c[a.id]?'on':''}' onclick="toggle('${p}','${d}','${a.id}',${a.src==='x'})">✓</button>${a.src==='x'?`<button class='btn ghost small' onclick="rem('${p}','${d}','${a.id}')">Suppr.</button>`:''}</div>`).join('')}</div></div><div class='card'><h3>Activité libre</h3><label>Icône</label><input id='ce' value='➕'><label>Nom</label><input id='cn' placeholder='ex : Grip avec pince'><label>Durée</label><input id='cd' placeholder='ex : 8 min'><label>Détails</label><textarea id='ct' placeholder='ex : 3 séries par main'></textarea><label>Sauvegarder</label><select id='cs'><option value='today'>Aujourd’hui seulement</option><option value='always'>Tous les ${N[d]}s</option></select><button class='btn ok full' onclick='custom()'>Ajouter</button></div><div class='card'><h3>Note</h3><textarea oninput="E('${p}','${d}').note=this.value;save()" placeholder='Jambes lourdes, poignet fatigué...'>${esc(e.note)}</textarea><button class='btn full' onclick='closeEd()'>Enregistrer</button></div>`;ed.classList.add('show')}function closeEd(){ed.classList.remove('show');render()}
function hero(p){return `<div class='card ${P[p][2]}'><div class='hero'><div class='avatar'>${P[p][0]}</div><div><h2>${P[p][1]}</h2><p class='muted'>${p==='cheikh'?'Force • endurance • travail physique':p==='yvane'?'Foot • technique • gardien':'Missions • fun • étoiles'}</p><span class='pill'>Personnalisable dans Modifier</span></div></div></div>`}function dcard(p,d){let pl=plan(p,d),e=E(p,d),ok=done(p,d);return `<div class='day ${d===tk()?'today':''} ${ok?'done':''}'><div class='em'>${pl[0]}</div><div class='info'><b>${N[d]}${tr(d)&&p==='cheikh'?' • entraînement':''}</b><small>${esc(pl[1])}<br>${esc(pl[2])}${e.x.length?' • +'+e.x.length+' ajout(s)':''}</small></div><button class='btn ghost small' onclick="openEd('${p}','${d}')">Modifier</button><button class='check ${ok?'on':''}' onclick="E('${p}','${d}').done=!E('${p}','${d}').done;save();render()">✓</button></div>`}function grip(){let n=0;D.forEach(d=>items('cheikh',d).forEach(a=>{let e=E('cheikh',d),ok=a.src==='x'?a.ok:e.c[a.id];if(ok&&/grip|poignée/i.test(a.n))n++}));return n}function todayPage(){let d=tk(),g=grip();return `${hero('cheikh')}<div class='card blue'><h3>Aujourd’hui</h3>${dcard('cheikh',d)}<button class='btn full' onclick="openEd('cheikh','${d}')">Modifier ma journée</button></div><div class='card green'><h3>Grip : ${g}/3</h3><div class='bar0'><div class='bar' style='width:${Math.min(100,g/3*100)}%'></div></div></div><div class='card green'><h3>Yvane</h3>${dcard('yvane',d)}</div><div class='card orange'><h3>Nelvyn</h3>${dcard('nelvyn',d)}</div>`}function weekPage(){return `<div class='card blue'><h3>Semaine</h3><p class='muted'>Appuie sur Modifier pour ajouter grip, pompes, foot, notes ou activité libre.</p></div><div class='list'>${D.map(d=>dcard('cheikh',d)).join('')}</div>`}function profile(p){return `${hero(p)}<div class='list'>${D.map(d=>dcard(p,d)).join('')}</div>`}function nutri(){let w=WW(),k=new Date().toDateString(),o=w.water[k]=w.water[k]||{},mom=['Réveil','Matin','Midi','Après-midi','Avant séance','Après séance','Soir'];return `<div class='card blue'><h3>Nutrition / hydratation</h3><p class='muted'>Cadre de journée, pas de menu.</p></div><div class='list'>${mom.map((m,i)=>`<div class='water'><div class='em'>💧</div><div class='info'><b>${m}</b><small>Eau / repas normal selon moment</small></div><button class='check ${o[i]?'on':''}' onclick='let o=WW().water[new Date().toDateString()];o[${i}]=!o[${i}];save();render()'>✓</button></div>`).join('')}</div>`}function suiviPage(){let ch=D.filter(d=>done('cheikh',d)).length,y=D.filter(d=>done('yvane',d)).length,n=D.filter(d=>done('nelvyn',d)).length;return `<div class='card blue'><h3>Suivi</h3><div class='grid3'><div class='stat'><b>${ch}</b><small>Cheikh</small></div><div class='stat'><b>${y}</b><small>Yvane</small></div><div class='stat'><b>${n}</b><small>Nelvyn</small></div></div><button class='btn full' onclick='nextWeek()'>Passer à la semaine suivante</button></div>`}function nextWeek(){if(!confirm('Passer à la semaine suivante ?'))return;let d=new Date(S.a);d.setDate(d.getDate()+7);S.a=d.toISOString().slice(0,10);S.w[S.a]={e:{},water:{}};save();render()}function tab(t){cur=t;document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById(t).classList.add('on');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('sel',b.dataset.t===t));scrollTo(0,0)}function render(){today.innerHTML=todayPage();week.innerHTML=weekPage();cheikh.innerHTML=profile('cheikh');yvane.innerHTML=profile('yvane');nutrition.innerHTML=nutri();suivi.innerHTML=suiviPage();tab(cur)}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>tab(b.dataset.t));ed.onclick=e=>{if(e.target===ed)closeEd()};render();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
</script></body></html>
